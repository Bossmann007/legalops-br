name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

permissions:
  contents: read

env:
  # Synthetic salt used only for CI — never reuse in production.
  # `pii_redactor` requires LEGALOPS_PII_SALT (>=16 bytes) since 9c1ce8e.
  LEGALOPS_PII_SALT: ci-synthetic-salt-32-bytes-not-secret

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.11

      - name: Install deps
        run: uv sync --extra dev

      - name: Generate synthetic corpus
        run: uv run python tests/corpus/synthetic/generate.py --count 200

      - name: Ruff
        run: uv run ruff check src tests .claude/scripts

      - name: Mypy
        run: uv run mypy src

      - name: Pytest
        run: uv run pytest --no-cov -v

      - name: Harness smoke (hooks/agents/manifest + anti-injection)
        run: ./.claude/scripts/harness_smoke.sh

      - name: Validate pipeline E2E
        run: uv run python .claude/scripts/validate_pipeline.py

      - name: Measure redactor (gate 0 leaks)
        run: uv run python .claude/scripts/measure_redactor.py
