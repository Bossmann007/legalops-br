name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.11

      - name: Install deps
        run: uv sync --extra dev

      - name: Generate synthetic corpus
        run: uv run python corpus/synthetic/generate.py --count 200

      - name: Ruff
        run: uv run ruff check src tests scripts corpus

      - name: Mypy
        run: uv run mypy src

      - name: Pytest
        run: uv run pytest --no-cov -v

      - name: Validate pipeline E2E
        run: uv run python scripts/validate_pipeline.py

      - name: Measure redactor (gate 0 leaks)
        run: uv run python scripts/measure_redactor.py
