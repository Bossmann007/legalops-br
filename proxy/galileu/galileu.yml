# galileu.yml — LegalOps BR
# Proxy de seguranca local (MITM) entre Claude Code / Cursor / OpenCode e LLMs.
# Camada de defesa em profundidade: pii-redactor-br (aplicacional) + Galileu (network).
#
# Como rodar:
#   cd /home/bossmann/Projects/legalops-br/proxy/galileu
#   /home/bossmann/Projects/galileu-cli/galileu --dry-run   # teste
#   /home/bossmann/Projects/galileu-cli/galileu             # producao local
#
# Porta: 9000 (default)
# Configurar cliente: HTTP_PROXY=http://localhost:9000 HTTPS_PROXY=http://localhost:9000

proxy:
  mode: passive

  skip_hosts:
    - "*.telemetry.*"
    - "*.analytics.*"
    - "mobile.events.data.microsoft.com"
    - "telemetry.opencode.ai"

analyzer:

  built_in:
    openai_key:         true
    openai_project_key: true
    anthropic_key:      true
    google_key:         true
    github_token:       true
    slack_token:        true
    discord_token:      true
    aws_key:            true

  custom_patterns:

    - name: "CPF"
      type: regex
      pattern: '\b\d{3}\.\d{3}\.\d{3}-\d{2}\b'
      label: "[CPF_REDACTED]"
      enabled: true

    - name: "CNPJ"
      type: regex
      pattern: '\b\d{2}\.\d{3}\.\d{3}/\d{4}-\d{2}\b'
      label: "[CNPJ_REDACTED]"
      enabled: true

    - name: "RG"
      type: regex
      pattern: '\b\d{1,2}\.\d{3}\.\d{3}-[\dXx]\b'
      label: "[RG_REDACTED]"
      enabled: true

    - name: "OAB"
      type: regex
      pattern: '\bOAB[/-]?[A-Z]{2}\s?\d{1,6}\b'
      label: "[OAB_REDACTED]"
      enabled: true

    - name: "PIX UUID"
      type: regex
      pattern: '\b[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}\b'
      label: "[PIX_UUID_REDACTED]"
      enabled: true

    - name: "Telefone BR"
      type: regex
      pattern: '\+?55?\s?\(?\d{2}\)?\s?9?\d{4}-?\d{4}\b'
      label: "[PHONE_BR_REDACTED]"
      enabled: true

    - name: "Numero Processo CNJ"
      type: regex
      pattern: '\b\d{7}-\d{2}\.\d{4}\.\d\.\d{2}\.\d{4}\b'
      label: "[PROCESS_NUMBER_REDACTED]"
      enabled: true

    - name: "Clientes [REDACTED]"
      type: literal
      values:
        - "PLACEHOLDER_CLIENT_NAME"
      label: "[CLIENT_NAME_REDACTED]"
      enabled: false

    - name: "JWT Token"
      type: regex
      pattern: 'eyJ[a-zA-Z0-9_-]+\.eyJ[a-zA-Z0-9_-]+\.[a-zA-Z0-9_-]+'
      label: "[JWT_REDACTED]"
      enabled: true

    - name: "Chave Privada"
      type: regex
      pattern: '-----BEGIN.*PRIVATE KEY-----'
      label: "[PRIVATE_KEY_REDACTED]"
      enabled: true

    - name: "DB Password"
      type: regex
      pattern: 'DB_PASSWORD\s*=\s*[\x27]?[^\s\x27]+'
      label: "[DB_PASSWORD_REDACTED]"
      enabled: true

    - name: "Connection String"
      type: regex
      pattern: '(postgres|postgresql|mysql|mongodb|redis)://[^\s]+'
      label: "[CONNECTION_STRING_REDACTED]"
      enabled: true
