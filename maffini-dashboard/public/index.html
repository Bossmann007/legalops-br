<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Maffini & Rangel — Centro de Comando</title>
<link rel="manifest" href="/manifest.json">
<link rel="stylesheet" href="/css/brand.css">
<link rel="stylesheet" href="/css/views.css">
<meta name="theme-color" content="#0F1F3D">
<meta name="apple-mobile-web-app-title" content="Maffini">
<meta name="apple-mobile-web-app-capable" content="yes">
</head>
<body>
<a class="skip-link" href="#view">Pular para conteúdo</a>

<aside class="sidebar" aria-label="Navegação principal">
  <header class="sidebar__brand">
    <div class="sidebar__mark" aria-hidden="true">M&amp;R</div>
    <div class="sidebar__meta">
      <strong class="sidebar__name">Maffini &amp; Rangel</strong>
      <span class="sidebar__sub">Centro de Comando</span>
    </div>
  </header>

  <nav class="nav" aria-label="Seções">
    <button class="nav__item is-active" data-view="home">
      <span class="nav__icon">▣</span> Início
    </button>
    <button class="nav__item nav__item--cmd" data-view="commands">
      <span class="nav__icon">⌘</span> Comandos
    </button>
    <button class="nav__item" data-view="prazos">
      <span class="nav__icon">◷</span> Prazos
    </button>
    <button class="nav__item" data-view="intimacoes">
      <span class="nav__icon">✉</span> Intimações
    </button>
    <button class="nav__item" data-view="contratos">
      <span class="nav__icon">§</span> Contratos
    </button>
    <button class="nav__item" data-view="dsar">
      <span class="nav__icon">⚖</span> DSAR LGPD
    </button>
    <button class="nav__item" data-view="audit">
      <span class="nav__icon">⛓</span> Audit chain
    </button>
    <button class="nav__item" data-view="clientes">
      <span class="nav__icon">◉</span> Clientes
    </button>

    <hr class="nav__divider">
    <p class="nav__group-head">Áreas</p>
    <div id="areas-nav" class="nav__areas"></div>

    <hr class="nav__divider">
    <button class="nav__item" data-view="config">
      <span class="nav__icon">⚙</span> Configurações
    </button>
  </nav>

  <footer class="sidebar__footer">
    <small id="health-pulse" class="health is-loading" title="Status sistema">●</small>
    <small class="sidebar__version">v0.1</small>
  </footer>
</aside>

<main class="main" id="view" tabindex="-1">
  <div class="view-wrap">
    <p class="loading">Carregando…</p>
  </div>
</main>

<script src="/bundle.js"></script>
<script>
(function boot(){
  var wrap = document.querySelector('#view .view-wrap');
  if (!window.MAF) {
    // Build fallback message via DOM API (no innerHTML).
    wrap.replaceChildren();
    var box = document.createElement('div');
    box.className = 'empty';
    var h = document.createElement('h2');
    h.textContent = 'Bundle não carregado';
    var p = document.createElement('p');
    p.textContent = 'Rode `npm run build` no diretório do projeto.';
    box.appendChild(h);
    box.appendChild(p);
    wrap.appendChild(box);
    return;
  }
  MAF.boot();
})();
</script>
</body>
</html>
