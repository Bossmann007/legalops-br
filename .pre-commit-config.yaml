# Pre-commit hooks pra LegalOps BR.
#
# Setup:
#   pip install pre-commit
#   pre-commit install
#   pre-commit install --hook-type pre-push
#
# Run manual:
#   pre-commit run --all-files

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
        args: ["--maxkb=500"]
      - id: check-merge-conflict
      - id: detect-private-key

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.13.0
    hooks:
      - id: ruff
        args: ["--fix"]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.13.0
    hooks:
      - id: mypy
        files: ^src/
        additional_dependencies:
          - pydantic>=2.0
          - faker>=25.0

  - repo: local
    hooks:
      - id: pytest
        name: pytest (fast)
        entry: uv run pytest --no-cov -q
        language: system
        pass_filenames: false
        stages: [pre-push]

      - id: no-real-pii
        name: bloqueia nomes reais em diff
        entry: |
          bash -c '
          PAT="$(printf "maf""fini|may""lin")"
          if git diff --cached | grep -E "^\+[^+]" | grep -iE "$PAT" > /dev/null; then
            echo "ERRO: nomes reais detectados no diff staged. Use placeholders."
            exit 1
          fi
          '
        language: system
        pass_filenames: false
