# Pre-commit hooks pra LegalOps BR.
#
# Setup:
#   pip install pre-commit
#   pre-commit install
#   pre-commit install --hook-type pre-push
#
# Run manual:
#   pre-commit run --all-files

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
        args: ["--maxkb=500"]
      - id: check-merge-conflict
      - id: detect-private-key

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.13.0
    hooks:
      - id: ruff
        args: ["--fix"]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.13.0
    hooks:
      - id: mypy
        files: ^src/
        additional_dependencies:
          - pydantic>=2.0
          - faker>=25.0

  - repo: local
    hooks:
      - id: pytest
        name: pytest (fast)
        entry: uv run pytest --no-cov -q
        language: system
        pass_filenames: false
        stages: [pre-push]

      - id: no-real-pii
        name: bloqueia nomes reais em diff
        entry: |
          bash -c '
          PAT="$(printf "maf""fini|may""lin")"
          # maffini-dashboard/ usa o nome de marca real do cliente (legitimo).
          # .gitignore e este config referenciam o path da marca por necessidade.
          if git diff --cached -- ":(exclude)maffini-dashboard/" ":(exclude).gitignore" ":(exclude).pre-commit-config.yaml" | grep -E "^\+[^+]" | grep -iE "$PAT" > /dev/null; then
            echo "ERRO: nomes reais detectados no diff staged. Use placeholders."
            exit 1
          fi
          '
        language: system
        pass_filenames: false

      - id: no-structured-pii
        name: bloqueia PII estruturada em memory/ e skills/
        entry: |
          bash -c '
          # Escopo: memory/ e skills/ sao a superficie de vazamento de dado de CLIENTE
          # (templates/playbooks rastreados; dado real vai para memory.local/ gitignored).
          # NAO escaneia o resto do repo: docstrings/docs/tests usam o CPF sintetico
          # canonico 123.456.789-00 (invalido) como exemplo pedagogico legitimo.
          PAT="\b[0-9]{3}\.[0-9]{3}\.[0-9]{3}-[0-9]{2}\b|\bOAB[/-]?[A-Z]{2}[[:space:]]?[0-9]{1,6}\b|\(?[0-9]{2}\)?[[:space:]]?9?[0-9]{4}-[0-9]{4}\b"
          if git diff --cached -- memory/ skills/ | grep -E "^\+[^+]" | grep -E "$PAT" > /dev/null; then
            echo "PII estruturada (CPF/OAB/telefone) em memory/ ou skills/ — use alias/redact"
            exit 1
          fi
          '
        language: system
        pass_filenames: false

      - id: no-real-pii-fulltree
        name: bloqueia nomes reais no repo inteiro (pre-push)
        entry: |
          bash -c '
          PAT="$(printf "maf""fini|may""lin")"
          # maffini-dashboard/ legitimamente usa o nome de marca real do cliente.
          if git grep -iIE "$PAT" -- ":(exclude).pre-commit-config.yaml" ":(exclude).gitignore" ":(exclude)maffini-dashboard/" > /dev/null; then
            echo "ERRO: nomes reais presentes em arquivos rastreados:"
            git grep -inIE "$PAT" -- ":(exclude).pre-commit-config.yaml" ":(exclude).gitignore" ":(exclude)maffini-dashboard/"
            echo "Limpe-os antes do push (e considere reescrever historico)."
            exit 1
          fi
          '
        language: system
        pass_filenames: false
        stages: [pre-push]
